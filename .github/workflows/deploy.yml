name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: latexdo-cloud-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy / Cloudflare Containers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out cloud repo
        uses: actions/checkout@v6

      - name: Check out LatexDo frontend
        uses: actions/checkout@v6
        with:
          repository: latexdo/latexdo
          path: latexdo

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install cloud dependencies
        run: npm install

      - name: Typecheck cloud code
        run: npm run typecheck

      - name: Build editor frontend
        env:
          LATEXDO_FRONTEND_REPO: latexdo
        run: npm run build:frontend

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
